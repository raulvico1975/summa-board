name: Deploy Manual Emergency

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
      url: https://summa-board--summa-board.europe-west4.hosted.app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install dependencies
        run: npm ci

      - name: Auth with service account
        env:
          FIREBASE_SERVICE_ACCOUNT_SUMMA_BOARD: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SUMMA_BOARD }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_SUMMA_BOARD" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_SUMMA_BOARD secret"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_SUMMA_BOARD" > "$RUNNER_TEMP/gcp-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gcp-sa.json" >> "$GITHUB_ENV"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Repository tests
        run: npm run test:repo

      - name: Smoke with emulators
        run: npm run ci:smoke

      - name: Deploy production safely
        env:
          FIREBASE_PROJECT_ID: summa-board
          RUNTIME_SERVICE: ssrsummaboard
          RUNTIME_REGION: europe-west1
          PRODUCTION_BASE_URL: https://summareu.app
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: summa-board
          FORCE_CANONICAL_REDIRECT: "true"
          DAILY_DOMAIN: ${{ secrets.DAILY_DOMAIN }}
          STRIPE_PRICE_ID: ${{ secrets.STRIPE_PRICE_ID }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAILY_API_KEY: ${{ secrets.DAILY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          DAILY_WEBHOOK_BEARER_TOKEN: ${{ secrets.DAILY_WEBHOOK_BEARER_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: npm run deploy:prod:safe
